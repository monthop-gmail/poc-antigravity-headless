[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:dbus]
command=bash -c "mkdir -p /var/run/dbus && dbus-daemon --system --nofork"
autostart=true
autorestart=true
priority=5

[program:xvfb]
command=/usr/bin/Xvfb :0 -screen 0 %(ENV_DISPLAY_WIDTH)sx%(ENV_DISPLAY_HEIGHT)sx24 -ac
autostart=true
autorestart=true
priority=10

[program:fluxbox]
command=/usr/bin/fluxbox
environment=DISPLAY=":0"
autostart=true
autorestart=true
priority=20

[program:x11vnc]
command=/usr/bin/x11vnc -display :0 -rfbauth /root/.vnc/passwd -forever -shared -rfbport 5900 -noxdamage
autostart=true
autorestart=true
priority=30

[program:novnc]
command=/usr/bin/websockify --web /usr/share/novnc 6080 localhost:5900
autostart=true
autorestart=true
priority=40

[program:antigravity]
command=/opt/scripts/start-antigravity.sh
environment=DISPLAY=":0"
autostart=true
autorestart=false
priority=50
startsecs=0
startretries=1
